<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | PastaNova</title>
    <link rel="icon" href="../src/logo.png?v=2" type="image/png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/navbar.css">
    <link rel="stylesheet" href="/admin/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="admin-main">
        <div class="admin-container">
            <div class="admin-header reveal from-bottom" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2>ADMIN <span class="text-orange">CENTER</span></h2>
                    <p>Welcome back, Tobing! Manage your delicious menu here.</p>
                </div>
                <button onclick="logoutAdmin()" style="background:#FFE5E5; color:#FF4757; border:none; padding:12px 25px; border-radius:15px; font-weight:800; cursor:pointer; display:flex; align-items:center; gap:8px;">
                    <i class='bx bx-log-out' style="font-size: 1.2rem;"></i> LOGOUT
                </button>
            </div>

            <div class="admin-grid">
                <div class="left-column">
                    <div class="admin-card reveal from-left">
                        <h3><i class='bx bx-category'></i> CATEGORIES</h3>
                        <form id="catForm" class="mini-form">
                            <input type="text" id="catName" placeholder="New category name..." required>
                            <button type="submit" class="btn-icon"><i class='bx bx-plus'></i></button>
                        </form>
                        <ul id="catList" class="admin-list"></ul>
                    </div>

                    <div class="admin-card reveal from-left delay-1 mt-3">
                        <h3><i class='bx bx-plus-medical'></i> MANAGE ADD-ONS</h3>
                        <form id="addonForm" class="mini-form-column">
                            <input type="text" id="addonName" placeholder="Addon Name (e.g. Extra Cheese)" required>
                            <input type="number" id="addonPrice" placeholder="Price (0 if free)" required>
                            <input type="file" id="addonImage" accept="image/*" required style="padding: 8px;">
                            <button type="submit" class="btn-save-addon" id="saveAddonBtn">Save Add-on</button>
                        </form>
                        <ul id="addonList" class="admin-list mt-2"></ul>
                    </div>
                </div>

                <div class="admin-card reveal from-right">
                    <h3><i class='bx bx-plus-circle'></i> ADD NEW PRODUCT</h3>
                    <form id="menuForm">
                        <div class="form-group">
                            <label>Product Name</label>
                            <input type="text" name="name" id="menuName" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" id="menuDesc" rows="2" required></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Price (Rp)</label>
                                <input type="number" name="price" id="menuPrice" required>
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <select name="category" id="catSelect" required></select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Available Add-ons (Optional)</label>
                            <div id="addonSelectionGrid" class="addon-selection-grid">
                                </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="file-upload-box">
                                <input type="file" id="imageInput" multiple accept="image/*">
                                <i class='bx bx-cloud-upload' style="font-size: 2.5rem;"></i>
                                <span style="font-weight: 800; color:var(--primary-pink);">Click to select product photos</span>
                                <span>(Pilih multiple & Drag foto di bawah untuk mengatur urutan)</span>
                            </label>
                            <div id="imagePreviewContainer" class="preview-grid"></div>
                        </div>

                        <button type="submit" id="submitMenuBtn" class="full-btn">
                            <i class='bx bx-save'></i> SAVE TO DATABASE
                        </button>
                    </form>
                </div>
            </div>

            <div class="admin-card mt-3 reveal from-bottom">
                <h3><i class='bx bx-list-ul'></i> INVENTORY LIST</h3>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="menuTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="/script.js"></script>
    <script src="/admin/admin.js"></script>
</body>
</html>

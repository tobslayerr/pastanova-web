<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | PastaNova</title>
    <link rel="icon" href="/src/logo.png?v=2" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-pink: #C8104E; --bg-yellow: #EAF775; --bg-dark-brown: #4A2B1D; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background: linear-gradient(135deg, #FCFAFA 0%, #FFF4F7 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #fff; padding: 3rem; border-radius: 30px; box-shadow: 0 20px 50px rgba(200, 16, 78, 0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-box h2 { font-family: 'Anton', sans-serif; font-size: 2.5rem; color: var(--primary-pink); margin-bottom: 5px; }
        .login-box p { color: #888; font-weight: 700; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { font-weight: 800; font-size: 0.9rem; color: var(--bg-dark-brown); display: block; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 15px; border: 2px solid #EEE; border-radius: 15px; font-weight: 700; font-size: 1rem; transition: 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--primary-pink); background: rgba(200, 16, 78, 0.03); }
        .btn-login { background: var(--primary-pink); color: #fff; width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: var(--bg-dark-brown); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #errorMsg { color: #FF4757; font-weight: 800; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ADMIN PORTAL</h2>
        <p>Gunakan kredensial PastaNova</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">LOGIN SECURELY</button>
            <div id="errorMsg"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('http://localhost:5000/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if(res.ok) {
                    // Simpan Token di browser
                    localStorage.setItem('pastanova_admin_token', data.token);
                    window.location.href = '/admin/'; // Pindah ke Dashboard
                } else {
                    errorMsg.innerText = data.error;
                    errorMsg.style.display = 'block';
                }
            } catch(err) {
                errorMsg.innerText = "Gagal terhubung ke server.";
                errorMsg.style.display = 'block';
            } finally {
                btn.innerText = "LOGIN SECURELY";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

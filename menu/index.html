<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu | PastaNova</title>
    <link rel="icon" href="../src/logo.png?v=2" type="image/png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/navbar.css">
    <link rel="stylesheet" href="/footer.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div id="loader"><div class="loader-content"><div class="spinner-ring"></div><img src="/src/logo.png" alt="Loading" class="loader-logo"></div></div>
    
    <div id="navbar-placeholder"></div>

    <main>
        <section class="menu-section">
            <div class="container" style="flex-direction: column;">
                <div class="menu-header text-center">
                    <h2 class="reveal from-bottom">CRAFTED <span class="text-orange">WITH</span> PASSION</h2>
                    <p class="menu-subtitle reveal from-bottom delay-1">Pilih menu favoritmu dan nikmati kelezatan pasta otentik.</p>
                    
                    <div class="menu-controls reveal from-bottom delay-2">
                        <div class="search-wrapper">
                            <i class='bx bx-search'></i>
                            <input type="text" id="searchInput" placeholder="Cari pasta kesukaanmu...">
                        </div>
                        <div class="filter-box" id="filterBox"></div>
                    </div>
                </div>

                <div id="menu-grid" class="menu-grid"></div>
                <div id="pagination" class="pagination-controls reveal from-bottom"></div>
            </div>
        </section>

        <button class="floating-cart-btn" onclick="toggleCart()">
            <i class='bx bx-shopping-bag'></i>
            <span class="cart-badge">0</span>
        </button>

        <div id="cartModal" class="cart-overlay">
            <div class="cart-sidebar">
                <div class="cart-header">
                    <h3>Keranjang Pesanan</h3>
                    <button class="btn-close-cart" onclick="toggleCart()">&times;</button>
                </div>
                <div class="cart-items" id="cartItemsList"></div>
                <div class="cart-footer">
                    <div class="cart-total-row">
                        <span>Total Pembayaran</span>
                        <h3 id="cartTotalPrice">Rp 0</h3>
                    </div>
                    <button class="btn-checkout-wa" onclick="checkoutCartWA()">
                        <i class='bx bxl-whatsapp'></i> Pesan via WhatsApp
                    </button>
                </div>
            </div>
        </div>

        <div id="footer-placeholder"></div>
    </main>

    <script src="/script.js"></script>
    <script src="/menu.js"></script>
</body>
</html>
